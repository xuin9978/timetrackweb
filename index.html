    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif;
        background-color: #F2F2F7;
        color: #000;
        overflow: auto;
        overscroll-behavior-y: none;
        transition: background-color 520ms cubic-bezier(0.22, 1, 0.36, 1), color 520ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      body[data-color-mode="dark"] {
        background-color: #05070A;
      }
      
      /* UI Animations */
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
      @keyframes modalEnter { 0% { opacity: 0; transform: scale(0.95) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
      @keyframes themeBreath {
        0% { opacity: 0; transform: scale(0.96); }
        42% { opacity: 0.22; transform: scale(1.02); }
        100% { opacity: 0; transform: scale(1.08); }
      }
      
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* PWA Safe Area Support */
      :root {
        --safe-top: env(safe-area-inset-top, 20px);
        --safe-bottom: env(safe-area-inset-bottom, 20px);
        --app-bg: #F2F2F7;
        --app-surface: rgba(255, 255, 255, 0.94);
        --app-surface-muted: rgba(249, 250, 251, 0.96);
        --app-border: rgba(229, 231, 235, 0.9);
        --app-text: #111827;
        --app-text-muted: #6B7280;
        --app-shadow: 0 18px 48px rgba(15, 23, 42, 0.10);
        --toast-bg: rgba(255, 255, 255, 0.96);
      }

      body[data-color-mode="dark"] {
        --app-bg: #090D14;
        --app-surface: rgba(19, 24, 34, 0.88);
        --app-surface-muted: rgba(37, 45, 61, 0.82);
        --app-border: rgba(148, 163, 184, 0.18);
        --app-text: #F8FAFC;
        --app-text-muted: #94A3B8;
        --app-shadow: 0 24px 60px rgba(0, 0, 0, 0.38);
        --toast-bg: rgba(18, 22, 30, 0.96);
      }

      .pwa-mode {
        padding-top: var(--safe-top);
      }

      .App {
        isolation: isolate;
        background-color: var(--app-bg) !important;
        transition:
          background-color 560ms cubic-bezier(0.22, 1, 0.36, 1),
          color 420ms ease,
          filter 560ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .App::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        opacity: 0;
        background:
          radial-gradient(circle at 22% 10%, rgba(56, 90, 160, 0.20), transparent 34%),
          radial-gradient(circle at 88% 82%, rgba(46, 120, 110, 0.14), transparent 30%),
          #090D14;
        transition: opacity 620ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .App::after {
        content: "";
        position: fixed;
        inset: -12%;
        z-index: 0;
        pointer-events: none;
        opacity: 0;
        background:
          radial-gradient(circle at 16% 28%, rgba(255, 255, 255, 0.40), transparent 26%),
          radial-gradient(circle at 78% 72%, rgba(120, 150, 255, 0.22), transparent 32%);
        filter: blur(28px);
        transform: scale(0.98);
      }

      .App.dark-mode::before {
        opacity: 1;
      }

      .App .main-layout {
        position: relative;
        z-index: 1;
        transform-origin: center;
        transition:
          transform 620ms cubic-bezier(0.22, 1, 0.36, 1),
          opacity 360ms ease;
      }

      .App.theme-switching::after {
        animation: themeBreath 620ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .App.theme-switching .main-layout {
        transform: scale(0.992);
      }

      .App,
      .App .sidebar-container,
      .App .bg-white,
      .App .bg-\[\#FAFAFA\],
      .App .bg-gray-50,
      .App .bg-gray-100,
      .App .time-grid,
      .App .time-grid-header,
      .App .time-grid-body,
      .App .time-grid-axis,
      .App .time-grid-day-column {
        transition:
          background-color 520ms cubic-bezier(0.22, 1, 0.36, 1),
          background 520ms cubic-bezier(0.22, 1, 0.36, 1),
          border-color 520ms cubic-bezier(0.22, 1, 0.36, 1),
          box-shadow 520ms cubic-bezier(0.22, 1, 0.36, 1),
          color 360ms ease;
      }

      .time-grid-body {
        touch-action: none;
      }

      .time-grid-axis {
        box-shadow: none !important;
        filter: none !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }

      .time-grid-snap-layer {
        display: none;
      }

      .sync-status-bar,
      .toast-card,
      .settings-result {
        background: var(--toast-bg);
        border-color: var(--app-border);
        color: var(--app-text);
      }

      .sync-status-dot,
      .toast-dot {
        background: #10B981;
      }

      .sync-status-warn .sync-status-dot,
      .toast-info .toast-dot,
      .settings-result-info {
        background: rgba(239, 246, 255, 0.96);
        border-color: rgba(59, 130, 246, 0.22);
      }

      .sync-status-warn .sync-status-dot,
      .toast-info .toast-dot {
        background: #3B82F6;
      }

      .sync-status-error .sync-status-dot,
      .toast-error .toast-dot {
        background: #EF4444;
      }

      .settings-result-success {
        background: rgba(236, 253, 245, 0.94);
        border-color: rgba(16, 185, 129, 0.22);
      }

      .settings-result-error {
        background: rgba(254, 242, 242, 0.94);
        border-color: rgba(239, 68, 68, 0.22);
      }

      .App.dark-mode .toast-card,
      .App.dark-mode .sync-status-bar,
      .App.dark-mode .settings-result {
        background: var(--toast-bg);
        border-color: var(--app-border);
      }

      .App .text-black,
      .App .text-gray-900,
      .App .text-gray-800,
      .App .text-gray-700,
      .App .text-gray-600,
      .App .text-gray-500,
      .App .text-gray-400,
      .App .text-gray-300 {
        transition: color 360ms ease;
      }

      .sidebar-theme-toggle > div {
        position: relative;
        overflow: hidden;
        transition:
          transform 560ms cubic-bezier(0.16, 1, 0.3, 1),
          background-color 520ms cubic-bezier(0.22, 1, 0.36, 1),
          color 380ms ease,
          box-shadow 520ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .sidebar-theme-toggle > div::after {
        content: "";
        position: absolute;
        inset: -35%;
        opacity: 0;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.72), transparent 58%);
        transform: scale(0.45);
        transition:
          opacity 520ms ease,
          transform 620ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .sidebar-theme-toggle svg {
        position: relative;
        z-index: 1;
        transition:
          transform 620ms cubic-bezier(0.16, 1, 0.3, 1),
          opacity 300ms ease;
      }

      .sidebar-theme-toggle:hover > div {
        transform: translateY(-1px) scale(1.04);
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.10);
      }

      .sidebar-theme-toggle:active > div {
        transform: scale(0.94);
      }

      .App.dark-mode .sidebar-theme-toggle > div {
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
      }

      .App.dark-mode .sidebar-theme-toggle > div::after {
        opacity: 0.16;
        transform: scale(1);
      }

      .App.dark-mode .sidebar-theme-toggle svg {
        transform: rotate(180deg) scale(1.04);
      }

      .App.theme-switching .sidebar-theme-toggle > div {
        transform: scale(0.92);
      }

      .App.theme-switching .sidebar-theme-toggle > div::after {
        opacity: 0.34;
        transform: scale(1.18);
      }

      .App.theme-switching .sidebar-theme-toggle svg {
        opacity: 0.72;
        transform: rotate(90deg) scale(0.9);
      }

      .App.dark-mode {
        background: #090D14 !important;
        color: #F8FAFC;
      }

      .App.dark-mode .sidebar-container,
      .App.dark-mode .bg-white,
      .App.dark-mode .bg-\[\#FAFAFA\],
      .App.dark-mode .bg-gray-50 {
        background: rgba(19, 24, 34, 0.86) !important;
        backdrop-filter: blur(22px) saturate(130%);
        -webkit-backdrop-filter: blur(22px) saturate(130%);
      }

      .App.dark-mode .bg-gray-100 {
        background: rgba(37, 45, 61, 0.82) !important;
      }

      .App.dark-mode .border-gray-100,
      .App.dark-mode .border-gray-200,
      .App.dark-mode .border-gray-300 {
        border-color: rgba(148, 163, 184, 0.18) !important;
      }

      .App.dark-mode .shadow-sm,
      .App.dark-mode .shadow-md,
      .App.dark-mode .shadow-lg,
      .App.dark-mode .shadow-xl,
      .App.dark-mode .shadow-2xl {
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.38) !important;
      }

      .App.dark-mode .text-black,
      .App.dark-mode .text-gray-900,
      .App.dark-mode .text-gray-800,
      .App.dark-mode .text-gray-700 {
        color: #F8FAFC !important;
      }

      .App.dark-mode .text-gray-600,
      .App.dark-mode .text-gray-500,
      .App.dark-mode .text-gray-400,
      .App.dark-mode .text-gray-300 {
        color: #94A3B8 !important;
      }

      .App.dark-mode .bg-black {
        background: #F8FAFC !important;
        color: #05070A !important;
      }

      .App.dark-mode .time-grid {
        background:
          linear-gradient(180deg, rgba(17, 24, 39, 0.72), rgba(12, 18, 28, 0.86)),
          rgba(14, 20, 30, 0.92);
        border-radius: 18px;
        border: 1px solid rgba(148, 163, 184, 0.14);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .App.dark-mode .time-grid-header {
        background: rgba(9, 13, 20, 0.58);
        border-bottom-color: rgba(148, 163, 184, 0.14) !important;
      }

      .App.dark-mode .time-grid-body {
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.018) 0, transparent 28%),
          rgba(12, 18, 28, 0.42);
      }

      .App.dark-mode .time-grid-axis {
        background: rgba(9, 13, 20, 0.78) !important;
        border-right-color: rgba(148, 163, 184, 0.16) !important;
      }

      .App.dark-mode .time-grid-axis span {
        color: rgba(203, 213, 225, 0.74) !important;
      }

      .App.dark-mode .time-grid-axis-tick {
        border-top-color: rgba(148, 163, 184, 0.18) !important;
      }

      .App.dark-mode .time-grid-hour-line {
        border-top-color: rgba(148, 163, 184, 0.10) !important;
      }

      .App.dark-mode .time-grid-day-column {
        background: rgba(15, 23, 42, 0.18);
        border-right-color: rgba(148, 163, 184, 0.11) !important;
      }

      .App.dark-mode .time-grid-day-column.is-selected {
        background:
          linear-gradient(180deg, rgba(59, 130, 246, 0.12), rgba(59, 130, 246, 0.035)),
          rgba(15, 23, 42, 0.18) !important;
      }

      .App.dark-mode .time-grid .hover\:bg-gray-50:hover {
        background: rgba(59, 130, 246, 0.08) !important;
      }

      /* Unified compact Apple Calendar layout */
      body:not([data-color-mode="dark"]) {
        --app-bg: #f0f1f4;
        --app-surface: #fbfbfc;
        --app-surface-muted: #f4f5f7;
        --app-surface-raised: #ffffff;
        --app-border: rgba(60, 60, 67, 0.14);
        --app-border-soft: rgba(60, 60, 67, 0.095);
        --app-text: rgba(18, 18, 20, 0.92);
        --app-text-muted: rgba(60, 60, 67, 0.58);
        --app-text-faint: rgba(60, 60, 67, 0.42);
        --app-red: #ff3b30;
        --app-blue: #007aff;
        --app-shadow: none;
        --toast-bg: rgba(255, 255, 255, 0.96);
      }

      body[data-color-mode="dark"] {
        --app-bg: #1d1f1d;
        --app-surface: #202220;
        --app-surface-muted: #262826;
        --app-surface-raised: #2c2e2c;
        --app-border: rgba(255, 255, 255, 0.095);
        --app-border-soft: rgba(255, 255, 255, 0.055);
        --app-text: rgba(245, 245, 247, 0.92);
        --app-text-muted: rgba(235, 235, 245, 0.56);
        --app-text-faint: rgba(235, 235, 245, 0.36);
        --app-red: #ff453a;
        --app-blue: #0a84ff;
        --app-shadow: none;
        --toast-bg: rgba(44, 46, 44, 0.96);
      }

      body[data-color-mode="dark"],
      body:not([data-color-mode="dark"]) {
        background-color: var(--app-bg);
      }

      .App {
        background: var(--app-bg) !important;
        color: var(--app-text);
      }

      .App::before,
      .App::after {
        opacity: 0 !important;
        animation: none !important;
      }

      .App.theme-switching .main-layout {
        transform: none;
      }

      .App .main-layout {
        gap: 8px !important;
      }

      .App.sidebar-is-collapsed .main-layout {
        gap: 0 !important;
        max-width: none !important;
      }

      .App .calendar-workspace {
        gap: 0 !important;
        padding: 0 !important;
      }

      .App .apple-calendar-card,
      .App .event-panel,
      .App .sidebar-container {
        background: var(--app-surface) !important;
        border-color: var(--app-border) !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }

      .App .apple-calendar-card {
        padding: 12px 0 0 !important;
        border-left-width: 1px;
        border-right-width: 1px;
      }

      .App .calendar-toolbar {
        min-height: 48px;
        margin: 0 !important;
        padding: 0 12px 8px !important;
        border-bottom: 1px solid var(--app-border);
      }

      .App .apple-calendar-card.is-week-calendar {
        background: var(--app-surface) !important;
      }

      .App .calendar-toolbar.is-week-toolbar {
        min-height: 74px;
        position: relative;
        display: grid !important;
        grid-template-columns: minmax(220px, 1fr) auto minmax(130px, 1fr);
        align-items: start !important;
        column-gap: 16px;
        padding: 0 16px 10px !important;
        background: var(--app-surface) !important;
        border-bottom: 0 !important;
      }

      .App .calendar-toolbar.is-week-toolbar .calendar-title-block {
        grid-column: 1;
        justify-self: start;
        min-width: 210px;
      }

      .App .calendar-toolbar.is-week-toolbar .calendar-title-row {
        justify-content: flex-start;
      }

      .App .calendar-toolbar.is-week-toolbar .calendar-toolbar-actions {
        grid-column: 2 / 4;
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 14px !important;
        width: 100%;
        min-width: 0;
      }

      .App .calendar-toolbar.is-week-toolbar .calendar-segmented {
        flex: 0 0 auto;
      }

      .App .calendar-toolbar.is-week-toolbar .calendar-nav-cluster {
        flex: 0 0 auto;
        justify-self: end;
      }

      .App .calendar-title-block {
        position: static !important;
        transform: none !important;
        text-align: left !important;
      }

      .App .calendar-title {
        color: var(--app-text) !important;
        font-size: 24px !important;
        line-height: 1.05 !important;
        font-weight: 700 !important;
        letter-spacing: -0.01em;
      }

      .App .calendar-subtitle {
        color: var(--app-text-muted) !important;
        font-size: 12px !important;
        letter-spacing: 0.02em !important;
        margin-top: 2px;
      }

      .App .calendar-subtitle.week-hidden-subtitle {
        display: none !important;
      }

      .App .calendar-toolbar-actions {
        gap: 10px !important;
      }

      .App .calendar-segmented {
        background: color-mix(in srgb, var(--app-surface-raised) 42%, transparent) !important;
        border-color: var(--app-border) !important;
        border-radius: 9px !important;
        padding: 2px !important;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.045);
      }

      .App .calendar-segment {
        min-width: 34px;
        padding: 4px 12px !important;
        border-radius: 7px !important;
        color: var(--app-text-muted) !important;
        font-size: 12px !important;
        line-height: 1.1;
        box-shadow: none !important;
      }

      .App .calendar-segment.bg-white {
        background: color-mix(in srgb, var(--app-text) 11%, transparent) !important;
        color: var(--app-text) !important;
      }

      .App .calendar-segment:hover {
        background: color-mix(in srgb, var(--app-text) 7%, transparent) !important;
        color: var(--app-text) !important;
      }

      .App .calendar-nav-button,
      .App .calendar-panel-toggle,
      .App .event-panel-add {
        background: color-mix(in srgb, var(--app-text) 7%, transparent) !important;
        color: var(--app-text-muted) !important;
        box-shadow: none !important;
      }

      .App .calendar-nav-button:hover,
      .App .event-panel-add:hover {
        background: color-mix(in srgb, var(--app-text) 12%, transparent) !important;
        color: var(--app-text) !important;
      }

      .App .calendar-toolbar-divider {
        background: var(--app-border) !important;
      }

      .App .calendar-content,
      .App .time-grid,
      .App .time-grid-header,
      .App .time-grid-body,
      .App .month-view {
        background: var(--app-surface) !important;
      }

      .App .calendar-footer {
        height: 34px;
        padding: 0 12px;
        border-top: 1px solid var(--app-border-soft);
        color: var(--app-text-muted);
        font-size: 12px;
      }

      .App .calendar-today-button {
        color: var(--app-text-muted) !important;
      }

      .App .calendar-footer.is-hidden-for-week {
        display: none !important;
      }

      .App .calendar-week-today-button {
        background: color-mix(in srgb, var(--app-text) 7%, transparent) !important;
        color: var(--app-text-muted) !important;
        box-shadow: none !important;
      }

      .App .calendar-week-today-button:hover {
        background: color-mix(in srgb, var(--app-text) 12%, transparent) !important;
        color: var(--app-text) !important;
      }

      .App .calendar-today-button:hover {
        color: var(--app-text) !important;
      }

      .App .time-grid {
        border: 0 !important;
        border-radius: 0 !important;
        box-shadow: none !important;
      }

      .App .time-grid-header {
        border-bottom-color: var(--app-border) !important;
        padding-bottom: 0 !important;
      }

      .App .time-grid.is-week-view .time-grid-header {
        min-height: 92px;
        padding-left: 0 !important;
        padding-right: 10px;
        background: var(--app-surface) !important;
        border-top: 1px solid var(--app-border) !important;
        border-bottom-color: var(--app-border) !important;
        box-shadow: inset 0 -1px 0 var(--app-border-soft);
      }

      .App .time-grid-week-axis-header {
        display: flex;

        justify-content: flex-end;

        width: 58px !important;

      }

      .App .time-grid-week-number,

        font-weight: 500;
      }

        border-radius: 0 !important;
        padding: 6px 4px 7px !important;
      }

      .App .time-grid.is-week-view .time-grid-day-header {
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        min-height: 92px;
        padding: 0 4px 11px !important;
        border-right: 1px solid var(--app-border-soft);
        color: var(--app-text-muted);
      }

      .App .time-grid-week-date-line {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        min-height: 24px;
        font-size: 15px;

        font-weight: 500;
        color: var(--app-text-muted);
      }

      .App .time-grid-week-date-line.is-today {
        color: var(--app-red);
      }

      .App .time-grid-week-date-number {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 20px;
        height: 20px;
        border-radius: 999px;

      .App .time-grid-week-date-number.is-today {
        background: var(--app-red);
        color: #fff;
      }

      .App .time-grid-week-day-name,
      .App .time-grid-week-lunar-placeholder {
        color: var(--app-text-muted);
      }

      .App .time-grid-week-lunar-placeholder {
        min-height: 16px;
        font-size: 11px;
        line-height: 1.1;
        color: var(--app-text-faint);
      }

      .App .time-grid-day-header:hover {
        background: color-mix(in srgb, var(--app-text) 4%, transparent) !important;
