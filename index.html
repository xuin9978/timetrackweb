<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>iOS 26 Liquid Calendar</title>
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="日历" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="https://via.placeholder.com/180" sizes="180x180" />
    <link rel="apple-touch-icon" href="https://via.placeholder.com/167" sizes="167x167" />
    <link rel="apple-touch-icon" href="https://via.placeholder.com/152" sizes="152x152" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif;
        background-color: #F2F2F7;
        color: #000;
        overflow: auto;
        overscroll-behavior-y: none;
        transition: background-color 520ms cubic-bezier(0.22, 1, 0.36, 1), color 520ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      /* UI Animations */
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
      @keyframes modalEnter { 0% { opacity: 0; transform: scale(0.95) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
      @keyframes boardNavPress { 0% { transform: translateY(0) scale(0.94); } 58% { transform: translateY(-2px) scale(1.04); } 100% { transform: translateY(0) scale(1); } }
      
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* PWA Safe Area Support */
      :root {
        --safe-top: env(safe-area-inset-top, 20px);
        --safe-bottom: env(safe-area-inset-bottom, 20px);
        --app-bg: #F2F2F7;
        --app-surface: rgba(255, 255, 255, 0.94);
        --app-surface-muted: rgba(249, 250, 251, 0.96);
        --app-border: rgba(229, 231, 235, 0.9);
        --app-text: #111827;
        --app-text-muted: #6B7280;
        --app-shadow: 0 18px 48px rgba(15, 23, 42, 0.10);
        --toast-bg: rgba(255, 255, 255, 0.96);
      }

      .pwa-mode {
        padding-top: var(--safe-top);
      }

      .App {
        isolation: isolate;
        background-color: var(--app-bg) !important;
        transition:
          background-color 560ms cubic-bezier(0.22, 1, 0.36, 1),
          color 420ms ease,
          filter 560ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .App .main-layout {
        position: relative;
        z-index: 1;
        transform-origin: center;
        transition:
          transform 620ms cubic-bezier(0.22, 1, 0.36, 1),
          opacity 360ms ease;
      }

      .App,
      .App .sidebar-container,
      .App .bg-white,
      .App .bg-\[\#FAFAFA\],
      .App .bg-gray-50,
      .App .bg-gray-100,
      .App .time-grid,
      .App .time-grid-header,
      .App .time-grid-body,
      .App .time-grid-axis,
      .App .time-grid-day-column {
        transition:
          background-color 520ms cubic-bezier(0.22, 1, 0.36, 1),
          background 520ms cubic-bezier(0.22, 1, 0.36, 1),
          border-color 520ms cubic-bezier(0.22, 1, 0.36, 1),
          box-shadow 520ms cubic-bezier(0.22, 1, 0.36, 1),
          color 360ms ease;
      }

      .time-grid-body {
        touch-action: none;
      }

      .time-grid-axis {
        box-shadow: none !important;
        filter: none !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }

      .time-grid-snap-layer {
        display: none;
      }

      .mobile-details-backdrop,
      .mobile-details-drawer {
        display: none;
      }

      .sync-status-bar,
      .toast-card,
      .settings-result {
        background: var(--toast-bg);
        border-color: var(--app-border);
        color: var(--app-text);
      }

      .sync-status-dot,
      .toast-dot {
        background: #10B981;
      }

      .sync-status-warn .sync-status-dot,
      .toast-info .toast-dot,
      .settings-result-info {
        background: rgba(239, 246, 255, 0.96);
        border-color: rgba(59, 130, 246, 0.22);
      }

      .sync-status-warn .sync-status-dot,
      .toast-info .toast-dot {
        background: #3B82F6;
      }

      .sync-status-error .sync-status-dot,
      .toast-error .toast-dot {
        background: #EF4444;
      }

      .settings-result-success {
        background: rgba(236, 253, 245, 0.94);
        border-color: rgba(16, 185, 129, 0.22);
      }

      .settings-result-error {
        background: rgba(254, 242, 242, 0.94);
        border-color: rgba(239, 68, 68, 0.22);
      }

      .App.dark-mode .toast-card,
      .App.dark-mode .sync-status-bar,
      .App.dark-mode .settings-result {
        background: var(--toast-bg);
        border-color: var(--app-border);
      }

      .App .text-black,
      .App .text-gray-900,
      .App .text-gray-800,
      .App .text-gray-700,
      .App .text-gray-600,
      .App .text-gray-500,
      .App .text-gray-400,
      .App .text-gray-300 {
        transition: color 360ms ease;
      }

      .App.dark-mode {
        background: #090D14 !important;
        color: #F8FAFC;
      }

      .App.dark-mode .sidebar-container,
      .App.dark-mode .bg-white,
      .App.dark-mode .bg-\[\#FAFAFA\],
      .App.dark-mode .bg-gray-50 {
        background: rgba(19, 24, 34, 0.86) !important;
        backdrop-filter: blur(22px) saturate(130%);
        -webkit-backdrop-filter: blur(22px) saturate(130%);
      }

      .App.dark-mode .bg-gray-100 {
        background: rgba(37, 45, 61, 0.82) !important;
      }

      .App.dark-mode .border-gray-100,
      .App.dark-mode .border-gray-200,
      .App.dark-mode .border-gray-300 {
        border-color: rgba(148, 163, 184, 0.18) !important;
      }

      .App.dark-mode .shadow-sm,
      .App.dark-mode .shadow-md,
      .App.dark-mode .shadow-lg,
      .App.dark-mode .shadow-xl,
      .App.dark-mode .shadow-2xl {
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.38) !important;
      }

      .App.dark-mode .text-black,
      .App.dark-mode .text-gray-900,
      .App.dark-mode .text-gray-800,
      .App.dark-mode .text-gray-700 {
        color: #F8FAFC !important;
      }

      .App.dark-mode .text-gray-600,
      .App.dark-mode .text-gray-500,
      .App.dark-mode .text-gray-400,
      .App.dark-mode .text-gray-300 {
        color: #94A3B8 !important;
      }

      .App.dark-mode .bg-black {
        background: #F8FAFC !important;
        color: #05070A !important;
      }

      .App.dark-mode .time-grid {
        background:
          linear-gradient(180deg, rgba(17, 24, 39, 0.72), rgba(12, 18, 28, 0.86)),
          rgba(14, 20, 30, 0.92);
        border-radius: 18px;
        border: 1px solid rgba(148, 163, 184, 0.14);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .App.dark-mode .time-grid-header {
        background: rgba(9, 13, 20, 0.58);
        border-bottom-color: rgba(148, 163, 184, 0.14) !important;
      }

      .App.dark-mode .time-grid-body {
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.018) 0, transparent 28%),
          rgba(12, 18, 28, 0.42);
      }

      .App.dark-mode .time-grid-axis {
        background: rgba(9, 13, 20, 0.78) !important;
        border-right-color: rgba(148, 163, 184, 0.16) !important;
      }

      .App.dark-mode .time-grid-axis span {
        color: rgba(203, 213, 225, 0.74) !important;
      }

      .App.dark-mode .time-grid-axis-tick {
        border-top-color: rgba(148, 163, 184, 0.18) !important;
      }

      .App.dark-mode .time-grid-hour-line {
        border-top-color: rgba(148, 163, 184, 0.10) !important;
      }

      .App.dark-mode .time-grid-day-column {
        background: rgba(15, 23, 42, 0.18);
        border-right-color: rgba(148, 163, 184, 0.11) !important;
      }

      .App.dark-mode .time-grid-day-column.is-selected {
        background:
          linear-gradient(180deg, rgba(59, 130, 246, 0.12), rgba(59, 130, 246, 0.035)),
          rgba(15, 23, 42, 0.18) !important;
      }

      .App.dark-mode .time-grid .hover\:bg-gray-50:hover {
        background: rgba(59, 130, 246, 0.08) !important;
      }

      /* Unified compact Apple Calendar layout */
      body {
        --app-bg: #f0f1f4;
        --app-surface: #fbfbfc;
        --app-surface-muted: #f4f5f7;
        --app-surface-raised: #ffffff;
        --app-border: rgba(60, 60, 67, 0.14);
        --app-border-soft: rgba(60, 60, 67, 0.095);
        --app-text: rgba(18, 18, 20, 0.92);
        --app-text-muted: rgba(60, 60, 67, 0.58);
        --app-text-faint: rgba(60, 60, 67, 0.42);
        --app-red: #ff3b30;
        --app-blue: #007aff;
        --app-shadow: none;
        --toast-bg: rgba(255, 255, 255, 0.96);
      }

      body {
        background-color: var(--app-bg);
      }

      .App {
        background: var(--app-bg) !important;
        color: var(--app-text);
      }

      .App .main-layout {
        gap: 8px !important;
      }

      /* Desktop board migration shell: fixed navigation, elastic workspace. */
      @media (min-width: 769px) {
        .App.board-app-shell {
          min-height: 100dvh;
          height: 100dvh;
          padding: 0 !important;
          align-items: stretch !important;
          justify-content: flex-start !important;
          overflow: hidden !important;
        }

        .App .board-main-layout {
          width: 100% !important;
          max-width: none !important;
          height: 100dvh !important;
          min-height: 0;
          gap: 0 !important;
        }

        .App .board-sidebar {
          width: clamp(102px, 9vw, 144px) !important;
          min-width: clamp(102px, 9vw, 144px) !important;
          max-width: clamp(102px, 9vw, 144px) !important;
          height: 100% !important;
          flex: 0 0 clamp(102px, 9vw, 144px) !important;
          border-radius: 0 !important;
          border-width: 0 1px 0 0 !important;
          background: rgba(250, 250, 252, 0.96) !important;
          align-items: center !important;
          justify-content: flex-start !important;
          gap: 18px !important;
          padding: 18px 12px !important;
          overflow: visible !important;
          transform: none !important;
        }

        .App .board-sidebar-brand {
          width: 100%;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 8px;
          padding: 8px 4px 14px;
          border-bottom: 1px solid var(--app-border-soft);
          border-radius: 14px;
          background: transparent;
          cursor: pointer;
          position: relative;
          transition: background-color 180ms ease, transform 180ms ease;
        }

        .App .board-sidebar-brand:hover {
          background: rgba(255, 255, 255, 0.62);
          transform: translateY(-1px);
        }

        .App .board-sidebar-brand:active {
          transform: scale(0.97);
        }

        .App .board-sidebar-avatar {
          width: 38px;
          height: 38px;
          display: grid;
          place-items: center;
          border-radius: 50%;
          background: linear-gradient(145deg, #ffffff, #e9eaed);
          border: 1px solid var(--app-border);
          color: #7a5c2f;
          font-weight: 750;
          font-size: 14px;
          overflow: hidden;
          position: relative;
        }

        .App .board-sidebar-avatar img,
        .App .board-profile-avatar-preview,
        body > .board-profile-modal-backdrop .board-profile-avatar-preview img {
          width: 100%;
          height: 100%;
          object-fit: cover;
          display: block;
        }

        .App .board-sidebar-name {
          margin: 0;
          color: var(--app-text);
          font-size: 14px;
          font-weight: 750;
          line-height: 1.1;
        }

        .App .board-sidebar-copy {
          margin: 0;
          max-width: 92px;
          color: var(--app-text-muted);
          font-size: 11px;
          line-height: 1.5;
          text-align: center;
        }

        .App .board-profile-popover {
          position: absolute;
          top: 16px;
          left: calc(100% + 12px);
          z-index: 80;
          width: 240px;
          padding: 12px;
          border-radius: 18px;
          border: 1px solid var(--app-border-soft);
          background: rgba(255, 255, 255, 0.96);
          box-shadow: 0 18px 44px rgba(15, 23, 42, 0.14);
          backdrop-filter: blur(18px);
          -webkit-backdrop-filter: blur(18px);
          animation: scaleIn 180ms ease-out;
        }

        .App .board-profile-modal-backdrop,
        body > .board-profile-modal-backdrop {
          position: fixed;
          inset: 0;
          z-index: 120;
          display: grid;
          place-items: center;
          padding: 24px;
          background: rgba(15, 23, 42, 0.18);
          backdrop-filter: blur(8px);
          -webkit-backdrop-filter: blur(8px);
          animation: fadeIn 160ms ease-out;
        }

        .App .board-profile-modal,
        body > .board-profile-modal-backdrop .board-profile-modal {
          width: min(420px, calc(100vw - 48px));
          padding: 18px;
          border-radius: 24px;
          border: 1px solid var(--app-border-soft);
          background: rgba(255, 255, 255, 0.97);
          box-shadow: 0 28px 70px rgba(15, 23, 42, 0.2);
          animation: modalEnter 190ms cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .App .board-profile-popover-head,
        body > .board-profile-modal-backdrop .board-profile-popover-head {
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: 10px;
          color: var(--app-text);
          font-size: 13px;
          font-weight: 760;
        }

        .App .board-profile-popover-head button,
        body > .board-profile-modal-backdrop .board-profile-popover-head button {
          width: 26px;
          height: 26px;
          display: grid;
          place-items: center;
          border: 1px solid var(--app-border-soft);
          border-radius: 50%;
          background: rgba(246, 247, 249, 0.92);
          color: var(--app-text-muted);
        }

        .App .board-profile-avatar-editor,
        body > .board-profile-modal-backdrop .board-profile-avatar-editor {
          width: 100%;
          display: flex;
          align-items: center;
          gap: 10px;
          padding: 8px;
          border-radius: 13px;
          border: 1px solid var(--app-border-soft);
          background: rgba(247, 248, 250, 0.82);
          color: var(--app-text);
          font-size: 12px;
          font-weight: 650;
          transition: transform 160ms ease, background-color 160ms ease;
        }

        .App .board-profile-avatar-editor:hover,
        body > .board-profile-modal-backdrop .board-profile-avatar-editor:hover {
          transform: translateY(-1px);
          background: #ffffff;
        }

        .App .board-profile-avatar-preview,
        body > .board-profile-modal-backdrop .board-profile-avatar-preview {
          width: 34px;
          height: 34px;
          display: grid;
          place-items: center;
          border-radius: 50%;
          overflow: hidden;
          background: linear-gradient(145deg, #ffffff, #e9eaed);
          border: 1px solid var(--app-border);
          color: #7a5c2f;
          font-weight: 750;
        }

        .App .board-profile-field,
        body > .board-profile-modal-backdrop .board-profile-field {
          display: flex;
          flex-direction: column;
          gap: 6px;
          margin-top: 10px;
          color: var(--app-text-muted);
          font-size: 11px;
          font-weight: 650;
        }

        .App .board-profile-field input,
        body > .board-profile-modal-backdrop .board-profile-field input,
        .App .board-profile-field textarea,
        body > .board-profile-modal-backdrop .board-profile-field textarea {
          width: 100%;
          border: 1px solid var(--app-border-soft);
          border-radius: 12px;
          background: rgba(248, 249, 251, 0.9);
          color: var(--app-text);
          font-size: 13px;
          line-height: 1.35;
          outline: none;
        }

        .App .board-profile-field input,
        body > .board-profile-modal-backdrop .board-profile-field input {
          height: 36px;
          padding: 0 10px;
        }

        .App .board-profile-field textarea,
        body > .board-profile-modal-backdrop .board-profile-field textarea {
          min-height: 62px;
          resize: none;
          padding: 9px 10px;
        }

        .App .board-profile-field input:focus,
        body > .board-profile-modal-backdrop .board-profile-field input:focus,
        .App .board-profile-field textarea:focus,
        body > .board-profile-modal-backdrop .board-profile-field textarea:focus {
          border-color: rgba(10, 132, 255, 0.42);
          box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.08);
          background: #ffffff;
        }

        .App .board-profile-save,
        body > .board-profile-modal-backdrop .board-profile-save {
          width: 100%;
          height: 36px;
          margin-top: 12px;
          border-radius: 12px;
          background: #151515;
          color: #ffffff;
          font-size: 13px;
          font-weight: 720;
          transition: transform 160ms ease, opacity 160ms ease;
        }

        .App .board-profile-save:active,
        body > .board-profile-modal-backdrop .board-profile-save:active {
          transform: scale(0.97);
        }

        .App .board-sidebar-nav {
          width: 100%;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 10px;
          margin-top: 10px;
        }

        .App .board-sidebar-nav-button {
          width: min(76px, 100%);
          min-height: 68px;
          display: flex;
          align-items: center;
          justify-content: center;
          border-radius: 16px;
          color: var(--app-text-muted);
          background: transparent !important;
          border: 0 !important;
          outline: none;
          transform: translateY(0) scale(1);
          transition:
            transform 180ms cubic-bezier(0.2, 0.8, 0.2, 1),
            background-color 180ms ease,
            color 180ms ease,
            box-shadow 180ms ease;
        }

        .App .board-sidebar-nav-icon {
          width: 26px !important;
          height: 26px !important;
          display: grid;
          place-items: center;
          border-radius: 8px;
          background: transparent !important;
          border: 0 !important;
          box-shadow: none !important;
          color: currentColor;
          transition: transform 180ms ease, opacity 180ms ease, color 180ms ease;
        }

        .App .board-sidebar-nav-label {
          color: currentColor;
          font-size: 12px;
          font-weight: 620;
          line-height: 1;
          transition: transform 180ms ease, opacity 180ms ease, color 180ms ease;
        }

        .App .board-sidebar-nav-button:hover {
          transform: translateY(-2px);
          background: rgba(255, 255, 255, 0.76);
          color: var(--app-text);
        }

        .App .board-sidebar-nav-button:hover .board-sidebar-nav-icon {
          transform: translateY(-1px) scale(1.04);
        }

        .App .board-sidebar-nav-button:active {
          transform: translateY(0) scale(0.94);
          transition-duration: 90ms;
        }

        .App .board-sidebar-nav-button.is-active {
          background: #151515 !important;
          background-color: #151515 !important;
          color: #ffffff !important;
          box-shadow: 0 12px 28px rgba(20, 20, 20, 0.16) !important;
          animation: boardNavPress 260ms cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .App .board-sidebar-nav-button.is-active:hover {
          background: #151515 !important;
          background-color: #151515 !important;
          color: #ffffff !important;
          transform: translateY(-1px) scale(1.01);
        }

        .App .board-sidebar-nav-button.is-active .board-sidebar-nav-icon {
          transform: scale(1.05);
          color: #ffffff !important;
        }

        .App .board-sidebar-nav-button.is-active .board-sidebar-nav-label {
          color: #ffffff !important;
          font-weight: 720;
        }

        .App .board-sidebar-nav-button > div:not(.board-sidebar-nav-icon),
        .App .board-sidebar-nav-button > span:not(.board-sidebar-nav-label) {
          display: none !important;
        }

        .App .board-sidebar-nav-button:focus-visible {
          box-shadow: 0 0 0 4px rgba(17, 24, 39, 0.08);
        }

        .App .board-sidebar .sidebar-add-button {
          display: none !important;
        }

        .App .board-sidebar .sidebar-actions {
          width: 100%;
          margin-top: auto !important;
          padding-top: 14px !important;
          border-top: 1px solid var(--app-border-soft) !important;
          border-left: 0 !important;
          gap: 10px !important;
        }

        .App .board-sidebar .sidebar-actions button > div {
          width: 44px !important;
          height: 44px !important;
          border-radius: 50% !important;
          background: rgba(255, 255, 255, 0.72) !important;
          border: 1px solid var(--app-border-soft) !important;
          color: var(--app-text-muted) !important;
          box-shadow: none !important;
        }
        }

        .App .board-main-layout > div:last-child {
          min-width: 0;
          height: 100%;
        }

        .App .board-status-strip {
          top: 26px;
          left: calc(clamp(102px, 9vw, 144px) + 32px);
          right: 32px;
          pointer-events: none;
        }

        .App .board-status-strip .sync-status-bar {
          pointer-events: auto;
          box-shadow: none !important;
        }

        .App .board-prototype-label {
          color: rgba(60, 60, 67, 0.48);
          font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
          font-size: 12px;
          letter-spacing: 0.08em;
          white-space: nowrap;
        }

        .App .board-module-content {
          padding: 78px 24px 24px !important;
          box-sizing: border-box;
        }

        .App .board-module-content,
        .App .board-module-content > .flex-1 {
          min-height: 0 !important;
          height: 100% !important;
        }

        .App .board-main-layout .calendar-workspace {
          height: 100% !important;
          width: 100% !important;
          gap: 12px !important;

      /* Mobile Layout Adaptation (Applies to both Mobile Browser and PWA) */
      @media (max-width: 768px) {
        :root {

          --mobile-safe-bottom: max(env(safe-area-inset-bottom, 0px), var(--mobile-safe-bottom-fallback));
          --mobile-nav-total-height: calc(var(--mobile-nav-height) + var(--mobile-safe-bottom));
          --mobile-content-bottom: var(--mobile-nav-total-height);
          --mobile-drawer-bottom: var(--mobile-nav-total-height);
          --mobile-sheet-bottom-padding: calc(14px + var(--mobile-safe-bottom));
        }

        html, body {
          height: 100%;
          font-size: 16px; /* Base font size to prevent iOS zoom */
          line-height: 1.6;
          overflow: hidden;
        }

        /* App Container */
        .App {
          padding: 0 !important;
          align-items: flex-start !important;
          justify-content: flex-start !important;
          min-height: 100vh;
          min-height: 100dvh; /* Use dvh for mobile browsers */
          height: 100dvh;
          width: 100% !important;
          overflow: hidden !important;
        }

        /* Main Layout Container */
        .main-layout {
          flex-direction: column !important;
          gap: 0 !important;
          /* Base padding for mobile browser */
          padding-bottom: var(--mobile-content-bottom);
          width: 100% !important;
          max-width: none !important;
          height: 100dvh !important;
          min-height: 0 !important;
          overflow: hidden !important;
        }

        /* PWA Mode specific bottom padding */
        .pwa-mode .main-layout {
          padding-bottom: var(--mobile-content-bottom);
        }

        .main-layout > div:last-child {
          width: 100% !important;
          min-height: 0 !important;
          height: calc(100dvh - var(--mobile-content-bottom)) !important;
          overflow: hidden !important;
        }

        .calendar-workspace {
          display: flex !important;
          flex-direction: column !important;
          width: 100% !important;
          height: calc(100dvh - var(--mobile-content-bottom)) !important;

          gap: 0 !important;

          overflow: hidden !important;
